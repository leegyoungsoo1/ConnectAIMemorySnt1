<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker | Soos AI Lab</title>
    <style>
        :root {
            --weak: #ff4d4d;
            --medium: #ffd11a;
            --strong: #2ecc71;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #007bff;
        }

        /* Strength Bar */
        .strength-meter {
            height: 8px;
            background-color: #eee;
            border-radius: 4px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-text {
            text-align: right;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        /* Checklist */
        .checklist {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .checklist li {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }

        .checklist li::before {
            content: '○';
            margin-right: 8px;
            font-weight: bold;
        }

        .checklist li.valid {
            color: var(--strong);
        }

        .checklist li.valid::before {
            content: '✓';
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔐 비밀번호 강도 체크</h2>
    
    <div class="input-group">
        <label for="password">비밀번호 입력</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="off">
    </div>

    <div class="strength-meter">
        <div id="strength-bar" class="strength-bar"></div>
    </div>
    <div id="strength-text" class="strength-text">강도: 측정 불가</div>

    <ul class="checklist">
        <li id="length">최소 8자 이상</li>
        <li id="upper">대문자 포함</li>
        <li id="lower">소문자 포함</li>
        <li id="number">숫자 포함</li>
        <li id="special">특수문자 포함 (@$!%*?&)</li>
    </ul>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text');

    const requirements = {
        length: { regex: /.{8,}/, element: document.getElementById('length') },
        upper: { regex: /[A-Z]/, element: document.getElementById('upper') },
        lower: { regex: /[a-z]/, element: document.getElementById('lower') },
        number: { regex: /[0-9]/, element: document.getElementById('number') },
        special: { regex: /[@$!%*?&]/, element: document.getElementById('special') }
    };

    passwordInput.addEventListener('input', () => {
        const pwd = passwordInput.value;
        let score = 0;

        // 각 조건 검사 및 UI 업데이트
        Object.keys(requirements).forEach(key => {
            const { regex, element } = requirements[key];
            if (regex.test(pwd)) {
                element.classList.add('valid');
                score++;
            } else {
                element.classList.remove('valid');
            }
        });

        // 강도 계산 및 바 업데이트
        updateStrengthMeter(score, pwd.length);
    });

    function updateStrengthMeter(score, length) {
        let width = '0%';
        let color = '#eee';
        let text = '강도: 측정 불가';

        if (length === 0) {
            width = '0%';
            text = '강도: 측정 불가';
        } else if (score <= 2) {
            width = '33%';
            color = 'var(--weak)';
            text = '강도: 취약 ⚠️';
        } else if (score <= 4) {
            width = '66%';
            color = 'var(--medium)';
            text = '강도: 보통 ⚡';
        } else {
            width = '100%';
            color = 'var(--strong)';
            text = '강도: 강력함 🔥';
        }

        strengthBar.style.width = width;
        strengthBar.style.backgroundColor = color;
        strengthText.innerText = text;
        strengthText.style.color = color === '#eee' ? 'var(--text-muted)' : color;
    }
</script>

</body>
</html>
